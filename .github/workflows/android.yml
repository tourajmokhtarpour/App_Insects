name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true  # اگر از LFS استفاده می‌کنید

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create assets directory
      run: mkdir -p app/src/main/assets

    - name: Download TFLite model
      run: |
        # لینک Release خود را اینجا بگذارید
        curl -L -o app/src/main/assets/best_float16.tflite  \
          "https://github.com/USERNAME/App_Insects/releases/download/v1.0-model/best_float16.tflite "

    # ✅ استفاده از Gradle Action به جای gradlew
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Build Debug APK with Gradle
      run: gradle assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK with Gradle
      run: gradle assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk
