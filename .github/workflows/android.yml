name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create assets directory
      run: mkdir -p app/src/main/assets

    - name: Download TFLite model
      run: |
        curl -L -o app/src/main/assets/best_float16.tflite  \
          "https://github.com/USERNAME/App_Insects/releases/download/v1.0-model/best_float16.tflite "

    - name: Build with Gradle
      uses: gradle/gradle-build-action@v3
      with:
        arguments: assembleDebug assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk
