name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # اجازه اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create assets directory
      run: mkdir -p app/src/main/assets

    - name: Download TFLite model from Release
      run: |
        # دانلود مدل از GitHub Release
        # USERNAME و REPO را با مقادیر خود جایگزین کنید
        curl -L -o app/src/main/assets/best_float16.tflite \
          "https://github.com/tourajmokhtarpour/App_Insects/releases/download/v1.0-model/best_float16.tflite"

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
