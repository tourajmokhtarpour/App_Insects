name: Android CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Verify model exists
        run: |
          echo "Checking assets folder..."
          ls -lh app/src/main/assets/
          if [ ! -f app/src/main/assets/best_float16.tflite ]; then
            echo "ERROR: best_float16.tflite not found!"
            exit 1
          fi
          echo "✅ Model file found successfully!"

      # ✅ استفاده از action جدید
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
