    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create assets directory
      run: mkdir -p app/src/main/assets

    # ✅ روش 1: استفاده از URL تک‌خطی (ساده‌ترین)
    #- name: Download TFLite model
    #  run: curl -L -o app/src/main/assets/best.tflite "https://github.com/best_float16.tflite /App_Insects/releases/download/v1.0-model/best_float16.tflite "

    # یا
    # ✅ روش 2: استفاده از environment variable
    - name: Download TFLite model
      env:
    #     MODEL_URL: "https://github.com/YOUR_USERNAME/App_Insects/releases/download/v1.0-model/best_float16.tflite "
       run: curl -L -o app/src/main/assets/best_float16.tflite  "$MODEL_URL"

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk"
