name: Android CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Verify model exists
        run: |
          echo "Checking assets folder..."
          ls -lh app/src/main/assets/
          if [ ! -f app/src/main/assets/best_float16.tflite ]; then
            echo "ERROR: best_float16.tflite not found!"
            exit 1
          fi
          echo "✅ Model file found successfully!"

      - name: Setup Gradle Wrapper
        run: |
          # ساخت gradlew اگر وجود ندارد
          if [ ! -f gradlew ]; then
            echo "Creating gradlew..."
            cat > gradlew << 'EOF'
#!/bin/sh
exec java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
EOF
            chmod +x gradlew
          fi

      - name: Build with Gradle Wrapper
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
