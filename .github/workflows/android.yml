name: Android CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Create assets directory
        run: mkdir -p app/src/main/assets

      - name: Download TFLite model
        run: curl -L -o app/src/main/assets/best.tflite "https://github.com/tourajmokhtarpour/App_Insects/releases/download/v1.0-model/best_float16.tflite "

      - name: Verify model downloaded
        run: ls -lh app/src/main/assets/

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
