name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create assets directory
      run: mkdir -p app/src/main/assets

    # ✅ روش 1: استفاده از URL تک‌خطی (ساده‌ترین)
    - name: Download TFLite model
      run: curl -L -o app/src/main/assets/best.tflite "https://github.com/YOUR_USERNAME/App_Insects/releases/download/v1.0-model/best.tflite"

    # یا
